<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>University Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1c1c1a;
      --paper: #f4f1ea;
      --accent: #2d5a3d;
      --accent-light: #e8f0eb;
      --muted: #7a7870;
      --border: #ddd9ce;
      --danger: #8b2e2e;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
    }

    <!-- body { -->
      display: grid;
      grid-template-rows: 64px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--paper);
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 300;
    }

    main {
      display: grid;
      grid-template-columns: 300px 1fr;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--white);
      overflow: hidden;
    }

    .sidebar-top {
      padding: 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-top h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 0.95rem;
      font-weight: 400;
      margin-bottom: 0.85rem;
    }

    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 1.25rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--paper);
      user-select: none;
    }

    .drop-zone:hover, .drop-zone.over {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .drop-zone .icon { font-size: 1.4rem; display: block; margin-bottom: 0.4rem; }

    .drop-zone p { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
    .drop-zone strong { color: var(--accent); font-weight: 500; }

    /* Progress */
    #prog-wrap { margin-top: 0.9rem; display: none; }
    .track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.35s ease; border-radius: 2px; }
    #prog-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.35rem; }

    /* Results */
    .results-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0.85rem 1.25rem;
    }

    .section-heading {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0.75rem 0 0.5rem;
    }

    .section-heading:first-child { margin-top: 0; }

    .uni-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.15s;
    }

    .uni-row:hover { color: var(--accent); }
    .uni-row.miss { color: var(--muted); cursor: default; }

    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.ok  { background: var(--accent); }
    .dot.err { background: var(--danger); }
    .dot.yes    { background: #2d7a3d; }
    .dot.no     { background: #c0392b; }
    .dot.maybe  { background: #d4a017; }
    .dot.unknown{ background: #aaa; }

    .uni-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Stats footer */
    #stat-bar {
      padding: 0.6rem 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
      display: none;
      flex-shrink: 0;
    }

    #stat-bar b { color: var(--accent); font-weight: 500; }
    #stat-bar .miss { color: var(--danger); }

    /* Map */
    #map { width: 100%; height: 100%; z-index: 0; }

    .leaflet-popup-content-wrapper {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.13);
    }

    @media (max-width: 680px) {
      main { grid-template-columns: 1fr; grid-template-rows: 220px 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <h1>University Map</h1>
  <p>Upload a spreadsheet — column 1: university name &nbsp;·&nbsp; column 3: Outcome (Yes / No / Maybe)</p>
</header>

<main>
  <div class="sidebar">
    <div class="sidebar-top">
      <h2>Upload spreadsheet</h2>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-in').click()">
        <span class="icon">📄</span>
        <p><strong>Click to browse</strong> or drag &amp; drop<br>.xlsx, .xls or .csv</p>
      </div>
      <input type="file" id="file-in" accept=".xlsx,.xls,.csv" style="display:none" />

      <div style="display:flex;gap:1rem;margin-top:0.85rem;font-size:0.72rem;color:var(--muted);">
        <span style="display:flex;align-items:center;gap:0.35rem;"><span style="width:9px;height:9px;border-radius:50%;background:#2d7a3d;display:inline-block;flex-shrink:0"></span>Yes</span>
        <span style="display:flex;align-items:center;gap:0.35rem;"><span style="width:9px;height:9px;border-radius:50%;background:#c0392b;display:inline-block;flex-shrink:0"></span>No</span>
        <span style="display:flex;align-items:center;gap:0.35rem;"><span style="width:9px;height:9px;border-radius:50%;background:#d4a017;display:inline-block;flex-shrink:0"></span>Maybe</span>
        <span style="display:flex;align-items:center;gap:0.35rem;"><span style="width:9px;height:9px;border-radius:50%;background:#aaa;display:inline-block;flex-shrink:0"></span>Unknown</span>
      </div>

      <div id="prog-wrap">
        <div class="track"><div class="fill" id="fill"></div></div>
        <div id="prog-label">Reading file…</div>
      </div>
    </div>

    <div class="results-scroll" id="results"></div>
    <div id="stat-bar"></div>
  </div>

  <div id="map"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Map setup ──────────────────────────────────────────────
const map = L.map('map').setView([20, 0], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>',
  maxZoom: 18
}).addTo(map);

let activeMarkers = [];

// ── UI refs ────────────────────────────────────────────────
const dropZone  = document.getElementById('drop-zone');
const fileIn    = document.getElementById('file-in');
const progWrap  = document.getElementById('prog-wrap');
const fill      = document.getElementById('fill');
const progLabel = document.getElementById('prog-label');
const results   = document.getElementById('results');
const statBar   = document.getElementById('stat-bar');

// ── Drag & drop ────────────────────────────────────────────
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); handleFile(e.dataTransfer.files[0]); });
fileIn.addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let rows = [];
    if (file.name.toLowerCase().endsWith('.csv')) {
      rows = e.target.result.split('\n').map(l => l.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
    } else {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws, { header: 1 }).map(r => r.map(c => (c || '').toString().trim()));
    }

    // Skip header row if first cell looks like a label
    if (rows.length && /^(name|university|institution|school|college)$/i.test(rows[0][0])) {
      rows = rows.slice(1);
    }

    // Build entries: { name, outcome }
    let entries = rows
      .filter(r => r[0] && r[0].length > 1)
      .map(r => ({
        name: /university|college|institute|school/i.test(r[0]) ? r[0] : r[0] + ' University',
        outcome: (r[2] || '').trim()   // column 3 (zero-indexed: index 2)
      }));

    if (!entries.length) { alert('No names found in the first column.'); return; }
    geocodeAll(entries);
  };

  if (file.name.toLowerCase().endsWith('.csv')) reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}

// ── Outcome colour helper ──────────────────────────────────
function outcomeStyle(outcome) {
  switch ((outcome || '').toLowerCase().trim()) {
    case 'yes':   return { color: '#2d7a3d', cls: 'yes' };
    case 'no':    return { color: '#c0392b', cls: 'no' };
    case 'maybe': return { color: '#d4a017', cls: 'maybe' };
    default:      return { color: '#aaaaaa', cls: 'unknown' };
  }
}

function makeIcon(outcome) {
  const { color } = outcomeStyle(outcome);
  return L.divIcon({
    className: '',
    html: `<div style="width:11px;height:11px;background:${color};border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
    iconSize: [11, 11], iconAnchor: [5, 5]
  });
}

// ── Geocoding via Nominatim — multi-strategy fallback ──────
async function nominatim(query) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&addressdetails=1`;
  try {
    const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await res.json();
    if (data.length) return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
  } catch (_) {}
  return null;
}

function buildVariants(name) {
  const variants = [name];

  // Strip trailing "University" and try the bare name (e.g. "Harvard" from "Harvard University")
  const bare = name.replace(/\s+university$/i, '').replace(/\s+college$/i, '').trim();
  if (bare !== name) variants.push(bare);

  // Try swapping "X University" → "University of X"
  const ofForm = name.replace(/^(.+?)\s+University$/i, 'University of $1');
  if (ofForm !== name) variants.push(ofForm);

  // Try swapping "University of X" → "X University"
  const shortForm = name.replace(/^University of (.+)$/i, '$1 University');
  if (shortForm !== name) variants.push(shortForm);

  // Expand common US abbreviations
  const expanded = name
    .replace(/\bCal\b/gi, 'California')
    .replace(/\bUC\b/gi, 'University of California')
    .replace(/\bCSU\b/gi, 'California State University')
    .replace(/\bSt\.\s*/gi, 'Saint ')
    .replace(/\bMt\.\s*/gi, 'Mount ')
    .replace(/\bTech\b/gi, 'Technology')
    .replace(/\bIntl\b/gi, 'International');
  if (expanded !== name) variants.push(expanded);

  // Also try bare expanded form
  const bareExpanded = expanded.replace(/\s+university$/i, '').trim();
  if (bareExpanded !== expanded && bareExpanded !== bare) variants.push(bareExpanded);

  return [...new Set(variants)]; // deduplicate
}

async function geocodeOne(entry) {
  const variants = buildVariants(entry.name);

  for (let i = 0; i < variants.length; i++) {
    if (i > 0) await new Promise(r => setTimeout(r, 1100)); // rate limit between retries
    const result = await nominatim(variants[i]);
    if (result) return { ...entry, ...result, ok: true };
  }

  return { ...entry, ok: false };
}

async function geocodeAll(entries) {
  // Reset
  activeMarkers.forEach(m => m.remove());
  activeMarkers = [];
  results.innerHTML = '';
  statBar.style.display = 'none';
  progWrap.style.display = 'block';
  fill.style.background = '#2d5a3d';
  fill.style.width = '0%';

  const found = [], notFound = [];

  for (let i = 0; i < entries.length; i++) {
    const pct = Math.round(((i + 1) / entries.length) * 100);
    fill.style.width = pct + '%';
    progLabel.textContent = `Locating ${i + 1} of ${entries.length}: ${entries[i].name}…`;

    const r = await geocodeOne(entries[i]);
    (r.ok ? found : notFound).push(r);

    appendRow(r);

    await new Promise(res => setTimeout(res, 1100));
  }

  progLabel.textContent = `Done — ${found.length} located, ${notFound.length} not found`;
  setTimeout(() => { progWrap.style.display = 'none'; }, 1500);

  if (found.length) {
    map.fitBounds(found.map(r => [r.lat, r.lon]), { padding: [40, 40] });
  }

  statBar.style.display = 'block';
  statBar.innerHTML = `<b>${found.length}</b> mapped · <span class="miss">${notFound.length}</span> not found`;
}

// ── Sidebar row ────────────────────────────────────────────
function appendRow(r) {
  if (r.ok && !document.getElementById('h-found')) {
    const h = document.createElement('div');
    h.className = 'section-heading'; h.id = 'h-found'; h.textContent = 'Located';
    results.appendChild(h);
  }
  if (!r.ok && !document.getElementById('h-miss')) {
    const h = document.createElement('div');
    h.className = 'section-heading'; h.id = 'h-miss'; h.textContent = 'Not found';
    results.appendChild(h);
  }

  const { cls } = outcomeStyle(r.outcome);
  const dotClass = r.ok ? cls : 'err';

  const row = document.createElement('div');
  row.className = 'uni-row' + (r.ok ? '' : ' miss');

  const outcomeLabel = r.ok && r.outcome ? `<span style="font-size:0.7rem;color:var(--muted);margin-left:auto;flex-shrink:0">${r.outcome}</span>` : '';
  row.innerHTML = `<div class="dot ${dotClass}"></div><div class="uni-name" title="${r.name}">${r.name}</div>${outcomeLabel}`;

  if (r.ok) {
    const m = L.marker([r.lat, r.lon], { icon: makeIcon(r.outcome) })
      .addTo(map)
      .bindPopup(`<strong>${r.name}</strong>${r.outcome ? `<br><span style="color:#666">Outcome: ${r.outcome}</span>` : ''}`);
    activeMarkers.push(m);

    row.addEventListener('click', () => {
      map.setView([r.lat, r.lon], 13, { animate: true });
      m.openPopup();
    });
  }

  const missHeading = document.getElementById('h-miss');
  if (r.ok && missHeading) results.insertBefore(row, missHeading);
  else results.appendChild(row);
}
</script>
</body>
</html>
