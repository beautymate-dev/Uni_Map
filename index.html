<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>University Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1c1c1a;
      --paper: #f4f1ea;
      --accent: #2d5a3d;
      --accent-light: #e8f0eb;
      --muted: #7a7870;
      --border: #ddd9ce;
      --danger: #8b2e2e;
      --white: #ffffff;
      --yes: #2d7a3d;
      --no: #c0392b;
      --maybe: #d4a017;
      --unknown: #aaaaaa;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); }

    body { display: grid; grid-template-rows: 64px 1fr; height: 100vh; overflow: hidden; }

    header {
      display: flex; align-items: center; gap: 1.25rem;
      padding: 0 2rem; border-bottom: 1px solid var(--border); background: var(--paper);
    }
    header h1 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; font-weight: 400; letter-spacing: -0.01em; }
    header p { font-size: 0.8rem; color: var(--muted); font-weight: 300; }

    main { display: grid; grid-template-columns: 300px 1fr; overflow: hidden; height: 100%; min-height: 0; }

    .sidebar { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--white); overflow: hidden; }

    .sidebar-top { padding: 1.25rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .sidebar-top h2 { font-family: 'DM Serif Display', serif; font-size: 0.95rem; font-weight: 400; margin-bottom: 0.85rem; }

    .drop-zone {
      border: 1.5px dashed var(--border); border-radius: 8px; padding: 1.25rem 1rem;
      text-align: center; cursor: pointer; transition: all 0.2s; background: var(--paper); user-select: none;
    }
    .drop-zone:hover, .drop-zone.over { border-color: var(--accent); background: var(--accent-light); }
    .drop-zone .icon { font-size: 1.4rem; display: block; margin-bottom: 0.4rem; }
    .drop-zone p { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
    .drop-zone strong { color: var(--accent); font-weight: 500; }

    /* Legend */
    .legend { display: flex; gap: 0.85rem; margin-top: 0.85rem; font-size: 0.72rem; color: var(--muted); flex-wrap: wrap; }
    .legend span { display: flex; align-items: center; gap: 0.35rem; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

    /* Filter buttons */
    .filters { display: none; gap: 0.4rem; margin-top: 0.85rem; flex-wrap: wrap; }
    .filters.visible { display: flex; }
    .filter-btn {
      font-size: 0.72rem; font-family: 'DM Sans', sans-serif; padding: 3px 10px;
      border-radius: 999px; border: 1.5px solid var(--border); background: transparent;
      cursor: pointer; color: var(--muted); transition: all 0.15s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--ink); color: var(--ink); }
    .filter-btn.active { color: var(--white); border-color: transparent; }
    .filter-btn.active.all    { background: var(--ink); }
    .filter-btn.active.yes    { background: var(--yes); }
    .filter-btn.active.no     { background: var(--no); }
    .filter-btn.active.maybe  { background: var(--maybe); }
    .filter-btn.active.unknown{ background: var(--unknown); }

    /* Progress */
    #prog-wrap { margin-top: 0.9rem; display: none; }
    .track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.35s ease; border-radius: 2px; }
    #prog-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.35rem; }

    /* Results list */
    .results-scroll { flex: 1; overflow-y: auto; padding: 0.85rem 1.25rem; }

    .section-heading {
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.09em;
      text-transform: uppercase; color: var(--muted); margin: 0.75rem 0 0.5rem;
    }
    .section-heading:first-child { margin-top: 0; }

    .uni-row {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.35rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.8rem; cursor: pointer; transition: color 0.15s;
    }
    .uni-row:hover { color: var(--accent); }
    .uni-row.miss { color: var(--muted); cursor: default; }
    .uni-row.hidden { display: none; }

    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.yes    { background: var(--yes); }
    .dot.no     { background: var(--no); }
    .dot.maybe  { background: var(--maybe); }
    .dot.unknown{ background: var(--unknown); }
    .dot.err    { background: var(--danger); }

    .uni-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Stats footer */
    #stat-bar {
      padding: 0.6rem 1.25rem; border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--muted); display: none; flex-shrink: 0;
    }
    #stat-bar b { color: var(--accent); font-weight: 500; }
    #stat-bar .miss { color: var(--danger); }

    #map { width: 100%; height: 100%; min-height: 0; z-index: 0; }

    .leaflet-popup-content-wrapper {
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.13);
    }

    @media (max-width: 680px) {
      main { grid-template-columns: 1fr; grid-template-rows: 240px 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <h1>University Map</h1>
  <p>Upload a spreadsheet — column 1: university name &nbsp;·&nbsp; column 3: Outcome (Yes / No / Maybe)</p>
</header>

<main>
  <div class="sidebar">
    <div class="sidebar-top">
      <h2>Upload spreadsheet</h2>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-in').click()">
        <span class="icon">📄</span>
        <p><strong>Click to browse</strong> or drag &amp; drop<br>.xlsx, .xls or .csv</p>
      </div>
      <input type="file" id="file-in" accept=".xlsx,.xls,.csv" style="display:none" />

      <div class="legend">
        <span><span class="legend-dot" style="background:var(--yes)"></span>Yes</span>
        <span><span class="legend-dot" style="background:var(--no)"></span>No</span>
        <span><span class="legend-dot" style="background:var(--maybe)"></span>Maybe</span>
        <span><span class="legend-dot" style="background:var(--unknown)"></span>Unknown</span>
      </div>

      <div class="filters" id="filters">
        <button class="filter-btn active all"  data-filter="all">All</button>
        <button class="filter-btn yes"          data-filter="yes">Yes</button>
        <button class="filter-btn no"           data-filter="no">No</button>
        <button class="filter-btn maybe"        data-filter="maybe">Maybe</button>
        <button class="filter-btn unknown"      data-filter="unknown">Unknown</button>
      </div>

      <div id="prog-wrap">
        <div class="track"><div class="fill" id="fill"></div></div>
        <div id="prog-label">Reading file…</div>
      </div>
    </div>

    <div class="results-scroll" id="results"></div>
    <div id="stat-bar"></div>
  </div>

  <div id="map"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Map setup ──────────────────────────────────────────────
const map = L.map('map').setView([20, 0], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>',
  maxZoom: 18
}).addTo(map);
window.addEventListener('load', () => map.invalidateSize());

// Store all placed entries for filtering
let allEntries = [];  // { r, marker, row }
let activeFilter = 'all';

// ── UI refs ────────────────────────────────────────────────
const dropZone  = document.getElementById('drop-zone');
const fileIn    = document.getElementById('file-in');
const progWrap  = document.getElementById('prog-wrap');
const fill      = document.getElementById('fill');
const progLabel = document.getElementById('prog-label');
const results   = document.getElementById('results');
const statBar   = document.getElementById('stat-bar');
const filters   = document.getElementById('filters');

// ── Drag & drop ────────────────────────────────────────────
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); handleFile(e.dataTransfer.files[0]); });
fileIn.addEventListener('change', e => handleFile(e.target.files[0]));

// ── Filter buttons ─────────────────────────────────────────
filters.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
});

function applyFilter() {
  allEntries.forEach(({ r, marker, row }) => {
    if (!r.ok) return;
    const outcome = (r.outcome || '').toLowerCase().trim() || 'unknown';
    const visible = activeFilter === 'all' || outcome === activeFilter;
    row.classList.toggle('hidden', !visible);
    if (visible) map.addLayer(marker);
    else map.removeLayer(marker);
  });
}

// ── File reading ───────────────────────────────────────────
function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let rows = [];
    if (file.name.toLowerCase().endsWith('.csv')) {
      rows = e.target.result.split('\n').map(l => l.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
    } else {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws, { header: 1 }).map(r => r.map(c => (c || '').toString().trim()));
    }

    if (rows.length && /^(name|university|institution|school|college)$/i.test(rows[0][0])) {
      rows = rows.slice(1);
    }

    let entries = rows
      .filter(r => r[0] && r[0].length > 1)
      .map(r => ({
        name: /university|college|institute|school/i.test(r[0]) ? r[0] : r[0] + ' University',
        outcome: (r[2] || '').trim()
      }));

    if (!entries.length) { alert('No names found in the first column.'); return; }
    geocodeAll(entries);
  };

  if (file.name.toLowerCase().endsWith('.csv')) reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}

// ── Outcome colour helper ──────────────────────────────────
function outcomeStyle(outcome) {
  switch ((outcome || '').toLowerCase().trim()) {
    case 'yes':   return { color: '#2d7a3d', cls: 'yes' };
    case 'no':    return { color: '#c0392b', cls: 'no' };
    case 'maybe': return { color: '#d4a017', cls: 'maybe' };
    default:      return { color: '#aaaaaa', cls: 'unknown' };
  }
}

function makeIcon(outcome) {
  const { color } = outcomeStyle(outcome);
  return L.divIcon({
    className: '',
    html: `<div style="width:11px;height:11px;background:${color};border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
    iconSize: [11, 11], iconAnchor: [5, 5]
  });
}

// ── Geocoding via Photon (smarter, free, no key) ───────────
async function photon(query) {
  const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=1&lang=en`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.features && data.features.length > 0) {
      const [lon, lat] = data.features[0].geometry.coordinates;
      return { lat, lon };
    }
  } catch (_) {}
  return null;
}

function buildVariants(name) {
  const variants = [name];

  const bare = name.replace(/\s+university$/i, '').replace(/\s+college$/i, '').trim();
  if (bare !== name) variants.push(bare);

  const ofForm = name.replace(/^(.+?)\s+University$/i, 'University of $1');
  if (ofForm !== name) variants.push(ofForm);

  const shortForm = name.replace(/^University of (.+)$/i, '$1 University');
  if (shortForm !== name) variants.push(shortForm);

  const expanded = name
    .replace(/\bCal\b/gi, 'California')
    .replace(/\bUC\b/gi, 'University of California')
    .replace(/\bCSU\b/gi, 'California State University')
    .replace(/\bSt\.\s*/gi, 'Saint ')
    .replace(/\bMt\.\s*/gi, 'Mount ')
    .replace(/\bTech\b/gi, 'Technology')
    .replace(/\bIntl\b/gi, 'International');
  if (expanded !== name) variants.push(expanded);

  const bareExpanded = expanded.replace(/\s+university$/i, '').trim();
  if (bareExpanded !== expanded && bareExpanded !== bare) variants.push(bareExpanded);

  return [...new Set(variants)];
}

async function geocodeOne(entry) {
  const variants = buildVariants(entry.name);
  for (let i = 0; i < variants.length; i++) {
    if (i > 0) await new Promise(r => setTimeout(r, 600));
    const result = await photon(variants[i]);
    if (result) return { ...entry, ...result, ok: true };
  }
  return { ...entry, ok: false };
}

// ── Main geocode loop ──────────────────────────────────────
async function geocodeAll(entries) {
  allEntries.forEach(({ marker }) => map.removeLayer(marker));
  allEntries = [];
  results.innerHTML = '';
  statBar.style.display = 'none';
  filters.classList.remove('visible');
  activeFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === 'all');
  });
  progWrap.style.display = 'block';
  fill.style.background = '#2d5a3d';
  fill.style.width = '0%';

  let foundCount = 0, notFoundCount = 0;

  for (let i = 0; i < entries.length; i++) {
    const pct = Math.round(((i + 1) / entries.length) * 100);
    fill.style.width = pct + '%';
    progLabel.textContent = `Locating ${i + 1} of ${entries.length}: ${entries[i].name}…`;

    const r = await geocodeOne(entries[i]);
    r.ok ? foundCount++ : notFoundCount++;

    appendRow(r);

    // Photon is more relaxed on rate limits but we stay polite
    await new Promise(res => setTimeout(res, 600));
  }

  progLabel.textContent = `Done — ${foundCount} located, ${notFoundCount} not found`;
  setTimeout(() => { progWrap.style.display = 'none'; }, 1500);

  if (foundCount > 0) {
    const bounds = allEntries.filter(e => e.r.ok).map(e => [e.r.lat, e.r.lon]);
    map.fitBounds(bounds, { padding: [40, 40] });
    filters.classList.add('visible');
  }

  statBar.style.display = 'block';
  statBar.innerHTML = `<b>${foundCount}</b> mapped · <span class="miss">${notFoundCount}</span> not found`;
}

// ── Sidebar row ────────────────────────────────────────────
function appendRow(r) {
  if (r.ok && !document.getElementById('h-found')) {
    const h = document.createElement('div');
    h.className = 'section-heading'; h.id = 'h-found'; h.textContent = 'Located';
    results.appendChild(h);
  }
  if (!r.ok && !document.getElementById('h-miss')) {
    const h = document.createElement('div');
    h.className = 'section-heading'; h.id = 'h-miss'; h.textContent = 'Not found';
    results.appendChild(h);
  }

  const { cls } = outcomeStyle(r.outcome);
  const dotClass = r.ok ? cls : 'err';

  const row = document.createElement('div');
  row.className = 'uni-row' + (r.ok ? '' : ' miss');
  const outcomeLabel = r.ok && r.outcome
    ? `<span style="font-size:0.7rem;color:var(--muted);margin-left:auto;flex-shrink:0">${r.outcome}</span>`
    : '';
  row.innerHTML = `<div class="dot ${dotClass}"></div><div class="uni-name" title="${r.name}">${r.name}</div>${outcomeLabel}`;

  let marker = null;
  if (r.ok) {
    marker = L.marker([r.lat, r.lon], { icon: makeIcon(r.outcome) })
      .addTo(map)
      .bindPopup(`<strong>${r.name}</strong>${r.outcome ? `<br><span style="color:#666">Outcome: ${r.outcome}</span>` : ''}`);

    row.addEventListener('click', () => {
      map.setView([r.lat, r.lon], 13, { animate: true });
      marker.openPopup();
    });

    allEntries.push({ r, marker, row });
  }

  const missHeading = document.getElementById('h-miss');
  if (r.ok && missHeading) results.insertBefore(row, missHeading);
  else results.appendChild(row);
}
</script>
</body>
</html>
