<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>University Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1c1c1a;
      --paper: #f4f1ea;
      --accent: #2d5a3d;
      --accent-light: #e8f0eb;
      --muted: #7a7870;
      --border: #ddd9ce;
      --danger: #8b2e2e;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
    }

    body {
      display: grid;
      grid-template-rows: 64px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--paper);
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 300;
    }

    main {
      display: grid;
      grid-template-columns: 300px 1fr;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--white);
      overflow: hidden;
    }

    .sidebar-top {
      padding: 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-top h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 0.95rem;
      font-weight: 400;
      margin-bottom: 0.85rem;
    }

    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 1.25rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--paper);
      user-select: none;
    }

    .drop-zone:hover, .drop-zone.over {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .drop-zone .icon { font-size: 1.4rem; display: block; margin-bottom: 0.4rem; }

    .drop-zone p { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
    .drop-zone strong { color: var(--accent); font-weight: 500; }

    /* Progress */
    #prog-wrap { margin-top: 0.9rem; display: none; }
    .track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.35s ease; border-radius: 2px; }
    #prog-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.35rem; }

    /* Results */
    .results-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0.85rem 1.25rem;
    }

    .section-heading {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0.75rem 0 0.5rem;
    }

    .section-heading:first-child { margin-top: 0; }

    .uni-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.15s;
    }

    .uni-row:hover { color: var(--accent); }
    .uni-row.miss { color: var(--muted); cursor: default; }

    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.ok  { background: var(--accent); }
    .dot.err { background: var(--danger); }

    .uni-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Stats footer */
    #stat-bar {
      padding: 0.6rem 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
      display: none;
      flex-shrink: 0;
    }

    #stat-bar b { color: var(--accent); font-weight: 500; }
    #stat-bar .miss { color: var(--danger); }

    /* Map */
    #map { width: 100%; height: 100%; z-index: 0; }

    .leaflet-popup-content-wrapper {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.13);
    }

    @media (max-width: 680px) {
      main { grid-template-columns: 1fr; grid-template-rows: 220px 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <h1>University Map</h1>
  <p>Upload a spreadsheet — first column should be university names</p>
</header>

<main>
  <div class="sidebar">
    <div class="sidebar-top">
      <h2>Upload spreadsheet</h2>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-in').click()">
        <span class="icon">📄</span>
        <p><strong>Click to browse</strong> or drag &amp; drop<br>.xlsx, .xls or .csv</p>
      </div>
      <input type="file" id="file-in" accept=".xlsx,.xls,.csv" style="display:none" />

      <div id="prog-wrap">
        <div class="track"><div class="fill" id="fill"></div></div>
        <div id="prog-label">Reading file…</div>
      </div>
    </div>

    <div class="results-scroll" id="results"></div>
    <div id="stat-bar"></div>
  </div>

  <div id="map"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Map setup ──────────────────────────────────────────────
const map = L.map('map').setView([20, 0], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com">CARTO</a>',
  maxZoom: 18
}).addTo(map);

const mkIcon = L.divIcon({
  className: '',
  html: '<div style="width:11px;height:11px;background:#2d5a3d;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>',
  iconSize: [11, 11], iconAnchor: [5, 5]
});

let activeMarkers = [];

// ── UI refs ────────────────────────────────────────────────
const dropZone  = document.getElementById('drop-zone');
const fileIn    = document.getElementById('file-in');
const progWrap  = document.getElementById('prog-wrap');
const fill      = document.getElementById('fill');
const progLabel = document.getElementById('prog-label');
const results   = document.getElementById('results');
const statBar   = document.getElementById('stat-bar');

// ── Drag & drop ────────────────────────────────────────────
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); handleFile(e.dataTransfer.files[0]); });
fileIn.addEventListener('change', e => handleFile(e.target.files[0]));

// ── File reading ───────────────────────────────────────────
function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let names = [];
    if (file.name.toLowerCase().endsWith('.csv')) {
      names = e.target.result.split('\n')
        .map(l => l.split(',')[0].trim().replace(/^"|"$/g, ''))
        .filter(Boolean);
    } else {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      names = XLSX.utils.sheet_to_json(ws, { header: 1 })
        .map(r => (r[0] || '').toString().trim())
        .filter(Boolean);
    }

    // Skip header row if it looks like a label
    if (names.length && /^(name|university|institution|school|college)$/i.test(names[0])) {
      names = names.slice(1);
    }

    // Append "University" where needed
    names = names.map(n => /university|college|institute|school/i.test(n) ? n : n + ' University');

    if (!names.length) { alert('No names found in the first column.'); return; }
    geocodeAll(names);
  };

  if (file.name.toLowerCase().endsWith('.csv')) reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}

// ── Geocoding via Nominatim (free, no key) ─────────────────
async function geocodeOne(name) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name)}&format=json&limit=1`;
  try {
    const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await res.json();
    if (data.length) return { name, lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), ok: true };
  } catch (_) {}
  return { name, ok: false };
}

async function geocodeAll(names) {
  // Reset
  activeMarkers.forEach(m => m.remove());
  activeMarkers = [];
  results.innerHTML = '';
  statBar.style.display = 'none';
  progWrap.style.display = 'block';
  fill.style.background = '#2d5a3d';
  fill.style.width = '0%';

  const found = [], notFound = [];

  for (let i = 0; i < names.length; i++) {
    const pct = Math.round(((i + 1) / names.length) * 100);
    fill.style.width = pct + '%';
    progLabel.textContent = `Locating ${i + 1} of ${names.length}: ${names[i]}`;

    const r = await geocodeOne(names[i]);
    (r.ok ? found : notFound).push(r);

    // Add to sidebar live
    appendRow(r);

    // Nominatim rate limit: 1 request/second
    await new Promise(res => setTimeout(res, 1100));
  }

  progLabel.textContent = `Done — ${found.length} located, ${notFound.length} not found`;
  setTimeout(() => { progWrap.style.display = 'none'; }, 1500);

  // Fit map
  if (found.length) {
    const bounds = found.map(r => [r.lat, r.lon]);
    map.fitBounds(bounds, { padding: [40, 40] });
  }

  // Stats
  statBar.style.display = 'block';
  statBar.innerHTML = `<b>${found.length}</b> mapped · <span class="miss">${notFound.length}</span> not found`;
}

// ── Sidebar row ────────────────────────────────────────────
function appendRow(r) {
  // Insert section headings once
  if (r.ok && !document.getElementById('h-found')) {
    const h = document.createElement('div');
    h.className = 'section-heading'; h.id = 'h-found'; h.textContent = 'Located';
    results.appendChild(h);
  }
  if (!r.ok && !document.getElementById('h-miss')) {
    const h = document.createElement('div');
    h.className = 'section-heading'; h.id = 'h-miss'; h.textContent = 'Not found';
    results.appendChild(h);
  }

  const row = document.createElement('div');
  row.className = 'uni-row' + (r.ok ? '' : ' miss');
  row.innerHTML = `<div class="dot ${r.ok ? 'ok' : 'err'}"></div><div class="uni-name" title="${r.name}">${r.name}</div>`;

  if (r.ok) {
    const m = L.marker([r.lat, r.lon], { icon: mkIcon })
      .addTo(map)
      .bindPopup(`<strong>${r.name}</strong>`);
    activeMarkers.push(m);

    row.addEventListener('click', () => {
      map.setView([r.lat, r.lon], 13, { animate: true });
      m.openPopup();
    });
  }

  // Insert before the "not found" heading so found rows stay on top
  const missHeading = document.getElementById('h-miss');
  if (r.ok && missHeading) results.insertBefore(row, missHeading);
  else results.appendChild(row);
}
</script>
</body>
</html>
